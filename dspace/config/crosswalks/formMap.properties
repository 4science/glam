# Form mapping configuration for DSpace submission forms
# This file maps collections (by handle or name) to specific submission forms
#
# Format options:
# 1. Handle-based mapping: hdl_<prefix>_<suffix> = form-name
#    Example: hdl_123456789_1 = thesis-form
#
# 2. Collection name mapping (exact match): collection-name = form-name
#    Example: Theses and Dissertations = thesis-form
#
# 3. Partial name matching (case insensitive): partial-name = form-name
#    Example: thesis = thesis-form (matches any collection containing "thesis")
#
# The system searches in this order:
# 1. Exact handle match
# 2. Exact collection name match
# 3. First partial name match (case insensitive)
# 4. Returns null if no match found

# Example handle-based mappings
# hdl_123456789_1=default-form
# hdl_123456789_2=thesis-form

# Example collection name-based mappings
# Theses and Dissertations=thesis-form
# Journal Articles=article-form
# Research Data=dataset-form

# Example partial name mappings (case insensitive)
# thesis=thesis-form
# article=article-form
# dataset=dataset-form
# book=book-form
# conference=conference-form

# Default examples - uncomment and modify as needed
# default=submission-form
