## task queue implementation
plugin.single.org.dspace.curate.TaskQueue = org.dspace.curate.FileTaskQueue

# directory location of curation task queues
curate.taskqueue.dir = ${dspace.dir}/ctqueues

# (optional) directory location of scripted (non-java) tasks
# curate.script.dir = ${dspace.dir}/ctscripts

# Maximum amount of redirects set to 0 for none and -1 for unlimited
curate.checklinks.max-redirect = 0


###############################################
####### CurationOrchestratorScript Conf #######
###############################################

curation.s3.customer-id =
# S3 Bucket names for input json files
curation.s3.bucketName-input =
# S3 Bucket names for output files
curation.s3.bucketName-output =

# S3 timeout to wait between each call for a specific file.
# The default is 60 seconds.
# Unit to use for the timeout (SECONDS, MINUTES)
curation.s3.delayTimeUnit = SECONDS
# Numeric Timeout duration that will be used with the unit above
curation.s3.delayBetweenAttempts = 60
# Configuration to wait with an exponential law between each  request of a specific file
curation.s3.useExponentialBackoff = false

# S3 total timeout to wait for results, once expired the remaining processes will be marked as failed.
# The default is 20 minutes.
# Unit to use for the timeout (SECONDS, MINUTES)
curation.s3.globalTimeoutUnit = MINUTES
# Numeric Timeout duration that will be used with the unit above
curation.s3.globalTimeoutDuration = 20

# Email report configurations for {CurationOrchestratorScript}
# Disable email report sending, default is true
# curation.s3.send-report.enabled = false

###################################################