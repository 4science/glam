#---------------------------------------------------------------#
#-----------------STORAGE CONFIGURATIONS------------------------#
#---------------------------------------------------------------#
# Configuration properties used by the bitstore.xml config file #
#                                                               #
#---------------------------------------------------------------#

# assetstore.dir, look at DSPACE/config/spring/api/bitstore.xml for more options
assetstore.dir = ${dspace.dir}/assetstore

# Configures the incoming store between local or S3.
# This value will be used as `incoming` default store inside the `bitstore.xml`
# Possible values are:
#     - 0: to use the `localStore`;
#     - 1: to use the `s3Store`.
# If you want to add additional assetstores, they must be added to that bitstore.xml
# and new values should be provided as key-value pairs in the `stores` map of the
# `bitstore.xml` configuration.
assetstore.index.primary = 0

#if the assetstore path is symbolic link, use this configuration to allow that path.
#assetstore.allowed.roots = /data/assetstore

#---------------------------------------------------------------#
#-------------- Amazon S3 Specific Configurations --------------#
#---------------------------------------------------------------#
# The below configurations are only used if the primary storename
# is set to 's3Store' or the 's3Store' is configured as a secondary store
# in your bitstore.xml

# Enables or disables the store initialization during startup, without initialization the store won't work.
# if changed to true, a lazy initialization will be tried on next store usage, be careful an excecption could be thrown
assetstore.s3.enabled = false

# For using a relative path (xx/xx/xx/xxx...) set to true, default it false
# When true: it splits the path into subfolders, each of these
# are 2-chars (2-bytes) length, the last is the filename and could have
# at max 3-chars (3-bytes).
# When false: is used the absolute path using full filename.
assetstore.s3.useRelativePath = false

# S3 bucket name to store assets in. If unspecified, by default DSpace will
# create a bucket based on the hostname of `dspace.ui.url` setting.
assetstore.s3.bucketName =

# Subfolder to organize assets within the bucket, in case this bucket
# is shared. Optional, default is root level of bucket
assetstore.s3.subfolder =

# Optional custom S3 endpoint URI. Leave this blank / commented to use the Amazon default
# assetstore.s3.endpoint =



# AWS Authentication Type - configures how DSpace authenticates with AWS S3
# Forces a given store to use a spefic authentication mechanism
# Possible values:
#   - "default" (default): Uses DefaultCredentialsProvider (ref: https://docs.aws.amazon.com/sdk-for-java/latest/developer-guide/credentials-chain.html#credentials-default)
#   - "irsa": Uses IRSA (IAM Roles for Service Accounts) for EKS environments
#   - "sts": Uses STS (Security Token Service) for role assumption and temporary credentials
#   - "profile": Uses configured profile from AWS credentials file (~/.aws/credentials)
#   - "static": Uses static access/secret keys (not recommended for production)
# More info: https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts-minimum-sdk.html
assetstore.s3.awsAuthenticationType = default

#---------------------------------------------------------------#
#---------- STS (Security Token Service) Configuration ---------#
#---------------------------------------------------------------#
# The below configurations are only used when awsAuthenticationType is set to "sts"
# STS provides temporary credentials through role assumption, enhancing security
# and enabling cross-account access scenarios.
# assetstore.s3.awsAuthenticationType = sts

# Example: arn:aws:iam::123456789012:role/DSpaceS3CrossAccountRole
# assetstore.s3.sts.role =

# Session name for the assumed role session (optional)
# If not specified, defaults to "DSpace-S3-Session"
# assetstore.s3.sts.sessionname = DSpace-S3-Session

# STS-specific region (optional)
# By default uses the same region as S3 (awsRegionName)
# Useful when STS and S3 services need to be in different regions
# assetstore.s3.sts.region = ${assetstore.s3.awsRegionName}

# Duration of the assumed role session in seconds (optional)
# Valid range: 900 seconds (15 minutes) to 43200 seconds (12 hours)
# If not specified, AWS default duration is used (typically 1 hour)
# assetstore.s3.sts.sessionduration = 3600

# External ID for role assumption (optional)
# Used when the role requires an external ID for additional security
# Commonly used in cross-account scenarios
# assetstore.s3.sts.externalid =

# Custom STS endpoint (optional)
# Useful for STS regional endpoints or when using STS with custom endpoints
# Example: https://sts.us-west-2.amazonaws.com
# assetstore.s3.sts.endpoint =

#---------------------------------------------------------------#
#----------------- IRSA (IAM Roles for Service Accounts) -------#
#---------------------------------------------------------------#
# The below configuration is used when awsAuthenticationType is set to "irsa"
# IRSA is recommended for EKS (Kubernetes) environments, allowing secure, pod-level IAM role assignment.
# No static credentials are required; AWS SDK will use environment variables set by EKS:
#   - AWS_ROLE_ARN: IAM Role ARN assigned to the service account
#   - AWS_WEB_IDENTITY_TOKEN_FILE: Path to the web identity token file
#   - AWS_REGION: AWS region for S3 operations
# For more info: https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html
# Example usage:
#   assetstore.s3.awsAuthenticationType = irsa
#   assetstore.s3.bucketName = <your-bucket>
#   assetstore.s3.awsRegionName = <your-region>
# No further credential configuration is required for IRSA.
# Ensure your EKS service account is annotated with the correct IAM role.

# Optionally you can override the value of the environment variables used by the AWS SDK for Java to
# load the credentials from the IRSA setup.
# If left empty, the AWS SDK for Java will use the default environment variables:
#   - AWS_ROLE_ARN
#   - AWS_WEB_IDENTITY_TOKEN_FILE
#   - AWS_REGION
# Example:
#   assetstore.s3.irsa.role = arn:aws:iam::123456789012:role/YourEKSServiceAccountRole
#   assetstore.s3.irsa.tokenfile = /var/run/secrets/eks.amazonaws.com/serviceaccount/token
#   assetstore.s3.irsa.session = dspace-eks-session
#   assetstore.s3.awsRegionName = us-west-2


#---------------------------------------------------------------#
#---------------------------- PROFILE --------------------------#
#---------------------------------------------------------------#
# The below configurations are only used when awsAuthenticationType is set to "sts"
# STS provides temporary credentials through role assumption, enhancing security
# and enabling cross-account access scenarios.
# assetstore.s3.awsAuthenticationType = profile

# Name of the profile to use from the AWS credentials file (~/.aws/credentials)
# If not specified, the "default" profile is used
# assetstore.s3.profile.name = custom-profile

# Custom AWS credentials configuration file
# assetstore.s3.profile.file = /path/to/custom/credentials/file

#---------------------------------------------------------------#
#------------------- STATIC (NOT PRODUCTION READY!) ------------#
#---------------------------------------------------------------#
# Static AWS credentials (not recommended for production)
# Please don't use root credentials in production but rely on the aws credentials default
# discovery mechanism to configure them (ENV VAR, EC2 Iam role, IRSA, etc.)
# The preferred approach for security reason is to use the IAM user credentials, but isn't always possible.
# More information about credentials here: https://docs.aws.amazon.com/sdk-for-java/v1/developer-guide/credentials.html
# More information about IAM usage here: https://docs.aws.amazon.com/sdk-for-java/v1/developer-guide/java-dg-roles.html
assetstore.s3.awsAccessKey =
assetstore.s3.awsSecretKey =

# If the credentials are left empty,
# then this setting is ignored and the default AWS region will be used.
assetstore.s3.awsRegionName =

# The target throughput for transfer requests in Gbps. Higher value means more connections will be established with S3.
assetstore.s3.targetThroughputGbps = 10.0

# Sets the minimum part size for transfer parts. Decreasing the minimum part size causes multipart transfer to be split
# into a larger number of smaller parts.
assetstore.s3.minPartSizeBytes = 8388608

# Specifies the maximum number of S3 connections that should be established during a transfer.
# If not provided, it will be based on targetThroughputGbps
assetstore.s3.maxConcurrency =

# The algorithm the S3 client will use to create a checksum when doing putObject.
assetstore.s3.s3ChecksumAlgorithm = CRC32

# If this property is set, changes the endpoint of the S3 service
assetstore.s3.endpoint =

assetstore.s3.temp.enabled = false
assetstore.s3.temp.bucketName =
assetstore.s3.temp.subfolder =

# Pre-signed URL expiration time in seconds (default is 15 minutes)
# assetstore.s3.presigned.url.expiration.seconds =